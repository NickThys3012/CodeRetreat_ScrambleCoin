name: Release & Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: read

jobs:
  release-and-deploy:
    name: release-and-deploy
    runs-on: ubuntu-latest

    env:
      DOTNET_NOLOGO: true
      PUBLISH_DIR: ./publish

    steps:
      # ── 1. Checkout (full history + PAT so we can push back to main) ──────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      # ── 2. Find the merged PR and read its labels + title ─────────────────────
      - name: Get merged PR info
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          PR_JSON=$(gh api "repos/$GITHUB_REPOSITORY/commits/$SHA/pulls" \
            --jq '.[0] | {title: .title, labels: [.labels[].name]}' 2>/dev/null || echo '{}')

          LABELS=$(echo "$PR_JSON" | jq -r '.labels[]? // empty' | tr '\n' ' ')
          PR_TITLE=$(echo "$PR_JSON" | jq -r '.title // "Release"')

          echo "labels=$LABELS"   >> "$GITHUB_OUTPUT"
          echo "pr_title=$PR_TITLE" >> "$GITHUB_OUTPUT"

      # ── 3. Calculate next semver ──────────────────────────────────────────────
      - name: Determine next version
        id: version
        run: |
          LABELS="${{ steps.pr-info.outputs.labels }}"

          LATEST=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          [ -z "$LATEST" ] && LATEST="v1.0.0"

          VERSION="${LATEST#v}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)

          if echo "$LABELS" | grep -qw "major"; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif echo "$LABELS" | grep -qw "minor"; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            # patch label (or no label) — bump patch only
            PATCH=$((PATCH + 1))
          fi

          NEXT="v${MAJOR}.${MINOR}.${PATCH}"
          echo "next=$NEXT"       >> "$GITHUB_OUTPUT"
          echo "previous=$LATEST" >> "$GITHUB_OUTPUT"

      # ── 4. Create and push the new tag ────────────────────────────────────────
      - name: Tag and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.next }}"
          git push origin "${{ steps.version.outputs.next }}"

      # ── 5. Create GitHub Release with auto-generated notes ────────────────────
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.next }}" \
            --generate-notes \
            --title "${{ steps.version.outputs.next }}"

      # ── 6. Update changelog.json (written to disk before dotnet publish) ──────
      - name: Update changelog.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.next }}"
          DATE=$(date -u +"%Y-%m-%d")
          PR_TITLE="${{ steps.pr-info.outputs.pr_title }}"
          CHANGELOG="src/ScrambleCoin.Web/wwwroot/changelog.json"

          NOTES_BODY=$(gh release view "$VERSION" --json body --jq '.body // ""')

          NOTES_ARRAY=$(printf '%s' "$NOTES_BODY" \
            | grep -E '^\*\s|^-\s|^\* |^- ' \
            | sed 's/^[[:space:]]*[*-][[:space:]]*//' \
            | jq -R . | jq -s .)

          if [ -z "$NOTES_ARRAY" ] || [ "$NOTES_ARRAY" = "[]" ]; then
            NOTES_ARRAY='["See release notes on GitHub."]'
          fi

          EXISTING=$([ -f "$CHANGELOG" ] && cat "$CHANGELOG" || echo "[]")

          jq --arg  version  "$VERSION"    \
             --arg  date     "$DATE"       \
             --arg  title    "$PR_TITLE"   \
             --argjson notes "$NOTES_ARRAY" \
             '[{version: $version, date: $date, title: $title, notes: $notes}] + .' \
             <<< "$EXISTING" > "$CHANGELOG"

      # ── 7. Setup .NET ─────────────────────────────────────────────────────────
      - name: Setup .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      # ── 8. Build ──────────────────────────────────────────────────────────────
      - name: Restore dependencies
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build --no-restore --configuration Release

      # ── 9. Test ───────────────────────────────────────────────────────────────
      - name: Install Playwright browsers
        run: pwsh tests/ScrambleCoin.E2E.Tests/bin/Release/net9.0/playwright.ps1 install --with-deps chromium

      - name: Run tests
        run: >
          dotnet test
          --no-build
          --configuration Release
          --logger "trx;LogFileName=results.trx"
          --results-directory ./TestResults
          --collect:"XPlat Code Coverage"
          --settings coverlet.runsettings

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-cd
          path: ./TestResults/**/*.trx
          retention-days: 14

      # ── 10. Publish (changelog.json already written — gets bundled) ───────────
      - name: Publish web app
        run: >
          dotnet publish src/ScrambleCoin.Web/ScrambleCoin.Web.csproj
          --no-build
          --configuration Release
          --output ${{ env.PUBLISH_DIR }}

      # ── 11. Database migrations ───────────────────────────────────────────────
      - name: Install EF Core CLI tools
        run: dotnet tool install --global dotnet-ef --version 9.*

      - name: Run EF Core migrations
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
        run: >
          dotnet ef database update
          --project src/ScrambleCoin.Infrastructure
          --startup-project src/ScrambleCoin.Web
          --configuration Release
          --no-build

      # ── 12. Deploy to Azure App Service ──────────────────────────────────────
      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-scramblecoin
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}

      # ── 13. Commit updated changelog.json back to main ────────────────────────
      - name: Commit and push changelog.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/ScrambleCoin.Web/wwwroot/changelog.json
          if ! git diff --staged --quiet; then
            git commit -m "[skip ci] chore: update changelog.json for ${{ steps.version.outputs.next }}"
            git push origin main
          fi
