apiVersion: 1
datasources:
  - name: ScrambleCoin Prometheus
    type: prometheus
    access: proxy
    uid: scramblecoin-prometheus
    # Grafana expands ${ENV} in provisioning files at startup. Defaults to the
    # ACA internal hostname; overridable via the PROMETHEUS_URL env.
    url: ${PROMETHEUS_URL}
    isDefault: false
    editable: false
