services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: scramblecoin-sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    healthcheck:
      test:
        - CMD
        - /opt/mssql-tools18/bin/sqlcmd
        - -S
        - localhost
        - -U
        - sa
        - -P
        - ${MSSQL_SA_PASSWORD}
        - -Q
        - SELECT 1
        - -No
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  grafana:
    image: grafana/grafana:latest
    container_name: scramblecoin-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD}"
      GF_INSTALL_PLUGINS: ""
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      sqlserver:
        condition: service_healthy
      loki:
        condition: service_started

  scramblecoin-api:
    build:
      context: .
      dockerfile: src/ScrambleCoin.Api/Dockerfile
    container_name: scramblecoin-api
    ports:
      - "5001:5001"
    environment:
      # Non-Production value so the /metrics endpoint stays exposed for scraping.
      ASPNETCORE_ENVIRONMENT: "Docker"
      ASPNETCORE_URLS: "http://+:5001"
      ConnectionStrings__DefaultConnection: "Server=scramblecoin-sqlserver,1433;Database=ScrambleCoin;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True;"
    volumes:
      - api-logs:/app/logs
    depends_on:
      sqlserver:
        condition: service_healthy

  loki:
    image: grafana/loki:latest
    container_name: scramblecoin-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:latest
    container_name: scramblecoin-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/promtail/config.yml:/etc/promtail/config.yml:ro
      - api-logs:/var/log/scramblecoin/api:ro
      - ./src/ScrambleCoin.Web/logs:/var/log/scramblecoin/web:ro
    depends_on:
      - loki

  prometheus:
    image: prom/prometheus:latest
    container_name: scramblecoin-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - scramblecoin-api

volumes:
  grafana-data:
  prometheus-data:
  api-logs:
