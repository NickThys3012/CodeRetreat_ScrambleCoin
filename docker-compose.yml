services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: scramblecoin-sqlserver
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ScrambleCoin_Dev!2024"
    healthcheck:
      test:
        - CMD
        - /opt/mssql-tools18/bin/sqlcmd
        - -S
        - localhost
        - -U
        - sa
        - -P
        - ScrambleCoin_Dev!2024
        - -Q
        - SELECT 1
        - -No
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
